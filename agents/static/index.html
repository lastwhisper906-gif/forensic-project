<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Forensic Pipeline</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --accent: #6366f1;
    --accent-dim: #4f52c4;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --user-bubble: #6366f1;
    --ai-bubble: #1e2235;
    --danger: #ef4444;
    --warn: #f59e0b;
    --ok: #10b981;
    --radius: 18px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header .logo {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  header h1 { font-size: 16px; font-weight: 600; }
  header p  { font-size: 11px; color: var(--text-dim); }
  header .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--ok);
    margin-left: auto;
    box-shadow: 0 0 6px var(--ok);
  }

  /* Chat area */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  /* Message bubbles */
  .msg {
    display: flex;
    flex-direction: column;
    max-width: 86%;
    animation: fadeUp .2s ease;
  }
  .msg.user  { align-self: flex-end; align-items: flex-end; }
  .msg.ai    { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 11px 15px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.55;
    word-break: break-word;
  }
  .msg.user .bubble {
    background: var(--user-bubble);
    border-bottom-right-radius: 4px;
  }
  .msg.ai .bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .bubble p  { margin-bottom: 6px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble strong { color: #fff; }
  .bubble em { color: var(--text-dim); }
  .bubble code {
    background: #0f1117;
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 12px;
    font-family: monospace;
  }

  .timestamp {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 3px;
    padding: 0 4px;
  }

  /* Typing indicator */
  .typing .bubble {
    padding: 14px 18px;
  }
  .dots { display: flex; gap: 5px; }
  .dots span {
    width: 7px; height: 7px;
    background: var(--text-dim);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dots span:nth-child(2) { animation-delay: .2s; }
  .dots span:nth-child(3) { animation-delay: .4s; }

  /* Analysis card */
  .analysis-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    margin-top: 8px;
    width: 100%;
  }
  .analysis-card .ticker-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .analysis-card .ticker { font-size: 18px; font-weight: 700; }
  .analysis-card .tier-badge {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
  }
  .tier-1 { background: #ef44441a; color: #ef4444; border: 1px solid #ef444440; }
  .tier-2 { background: #f59e0b1a; color: #f59e0b; border: 1px solid #f59e0b40; }
  .tier-3 { background: #f97316  1a; color: #f97316; border: 1px solid #f9731640; }
  .tier-4 { background: #10b9811a; color: #10b981; border: 1px solid #10b98140; }

  .score-bar-wrap { margin: 6px 0 12px; }
  .score-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
  .score-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .score-fill {
    height: 100%;
    border-radius: 3px;
    transition: width .6s ease;
  }

  .detail-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
    color: var(--text-dim);
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-row span:last-child { color: var(--text); font-weight: 500; }

  /* Progress indicator */
  .progress-card {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 14px;
    padding: 14px;
    margin-top: 8px;
  }
  .progress-card .prog-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--accent); }
  .prog-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .prog-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    animation: progAnim 3s ease-in-out infinite;
  }
  .prog-status { font-size: 11px; color: var(--text-dim); }

  /* Input */
  #input-area {
    display: flex;
    gap: 8px;
    padding: 12px 14px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  #msg-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 10px 16px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    resize: none;
    max-height: 100px;
    overflow-y: auto;
    line-height: 1.4;
    font-family: inherit;
  }
  #msg-input:focus { border-color: var(--accent); }
  #msg-input::placeholder { color: var(--text-dim); }
  #send-btn {
    width: 42px; height: 42px;
    background: var(--accent);
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    align-self: flex-end;
    transition: background .15s;
  }
  #send-btn:hover { background: var(--accent-dim); }
  #send-btn:disabled { background: var(--border); cursor: not-allowed; }

  /* Suggestions */
  .suggestions {
    display: flex;
    gap: 6px;
    padding: 8px 14px 0;
    overflow-x: auto;
    flex-shrink: 0;
    scrollbar-width: none;
  }
  .suggestions::-webkit-scrollbar { display: none; }
  .suggestion-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
    cursor: pointer;
    flex-shrink: 0;
    transition: border-color .15s, color .15s;
  }
  .suggestion-chip:hover { border-color: var(--accent); color: var(--text); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40%           { transform: scale(1); }
  }
  @keyframes progAnim {
    0%   { width: 5%; }
    50%  { width: 75%; }
    100% { width: 90%; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">🔍</div>
  <div>
    <h1>Forensic Pipeline</h1>
    <p>AI 인프라 공매도 리서치</p>
  </div>
  <div class="status-dot" id="status-dot"></div>
</header>

<div id="chat"></div>

<div class="suggestions" id="suggestions">
  <div class="suggestion-chip" onclick="suggest('NVDA 분석해줘')">NVDA 분석</div>
  <div class="suggestion-chip" onclick="suggest('MSFT 분석해줘')">MSFT 분석</div>
  <div class="suggestion-chip" onclick="suggest('NVDA, MSFT 둘 다 분석해줘')">NVDA+MSFT</div>
  <div class="suggestion-chip" onclick="suggest('최근 분석 목록 보여줘')">분석 목록</div>
  <div class="suggestion-chip" onclick="suggest('NVDA 결과 자세히 설명해줘')">NVDA 상세</div>
</div>

<div id="input-area">
  <textarea id="msg-input" placeholder="종목 분석을 요청하세요..." rows="1"></textarea>
  <button id="send-btn" onclick="sendMessage()">↑</button>
</div>

<script>
const BASE = '';
let sessionId = localStorage.getItem('sessionId') || crypto.randomUUID();
localStorage.setItem('sessionId', sessionId);

let history = JSON.parse(localStorage.getItem('chatHistory_' + sessionId) || '[]');
let isLoading = false;
let pollingInterval = null;

// 페이지 로드 시 이전 대화 복원
window.addEventListener('load', () => {
  renderHistory();
  if (history.length === 0) {
    addAiMessage('안녕하세요! 포렌식 회계 분석 파이프라인입니다.\n\nAI 인프라 섹터 종목의 SEC 공시를 분석해 공매도 후보를 탐색합니다.\n\n예시: "NVDA 분석해줘" 또는 "NVDA, MSFT 둘 다 분석해줘"');
  }
});

function renderHistory() {
  const chat = document.getElementById('chat');
  chat.innerHTML = '';
  history.forEach(msg => {
    if (msg.role === 'user') addUserBubble(msg.text, false);
    else if (msg.role === 'ai') addAiBubble(msg.text, msg.card, false);
  });
  scrollToBottom();
}

function addUserBubble(text, save = true) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div><div class="timestamp">${now()}</div>`;
  chat.appendChild(div);
  if (save) {
    history.push({ role: 'user', text });
    saveHistory();
  }
  scrollToBottom();
}

function addAiBubble(text, card = null, save = true) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ai';
  const rendered = marked.parse(text || '');
  let html = `<div class="bubble">${rendered}</div>`;
  if (card) html += renderCard(card);
  html += `<div class="timestamp">${now()}</div>`;
  div.innerHTML = html;
  chat.appendChild(div);
  if (save) {
    history.push({ role: 'ai', text, card });
    saveHistory();
  }
  scrollToBottom();
}

function addAiMessage(text) { addAiBubble(text); }

function showTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ai typing';
  div.id = 'typing-indicator';
  div.innerHTML = `<div class="bubble"><div class="dots"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(div);
  scrollToBottom();
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function showProgress(jobId, tickers) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'progress-' + jobId;
  div.innerHTML = `
    <div class="progress-card">
      <div class="prog-title">🔍 ${tickers.join(', ')} 분석 중...</div>
      <div class="prog-bar"><div class="prog-fill"></div></div>
      <div class="prog-status">SEC EDGAR 데이터 수집 → 6개 에이전트 병렬 분석 → 포렌식 점수 산출</div>
    </div>
  `;
  chat.appendChild(div);
  scrollToBottom();
}

function removeProgress(jobId) {
  const el = document.getElementById('progress-' + jobId);
  if (el) el.remove();
}

function renderCard(data) {
  if (!data || !data.ticker) return '';
  const score = data.forensic_score ?? 0;
  const tier = data.tier ?? 4;
  const tierLabel = data.tier_label || 'Archive';
  const tierEmoji = ['🔴','🟡','🟠','🟢'][tier - 1] || '⚪';
  const scoreColor = tier === 1 ? '#ef4444' : tier === 2 ? '#f59e0b' : tier === 3 ? '#f97316' : '#10b981';

  let agentRows = '';
  if (data.agent_summaries) {
    const labels = {
      accruals: '발생액', revenue: '매출품질', capex: 'Capex',
      tenk_diff: '공시변화', call_nlp: '언어분석', catalyst: '촉매'
    };
    data.agent_summaries.forEach(a => {
      const s = a.score ?? '-';
      agentRows += `<div class="detail-row"><span>${labels[a.agent] || a.agent}</span><span>${s !== '-' ? Math.round(s) + '점' : '-'}</span></div>`;
    });
  }
  if (data.short_thesis) {
    agentRows += `<div style="margin-top:8px;font-size:12px;color:var(--text-dim);line-height:1.5">${escapeHtml(data.short_thesis.slice(0,200))}${data.short_thesis.length>200?'…':''}</div>`;
  }

  return `
    <div class="analysis-card">
      <div class="ticker-row">
        <span class="ticker">${data.ticker}</span>
        <span class="tier-badge tier-${tier}">${tierEmoji} Tier ${tier} · ${tierLabel}</span>
      </div>
      <div class="score-bar-wrap">
        <div class="score-label"><span>포렌식 점수</span><span style="color:${scoreColor};font-weight:700">${Math.round(score)}점</span></div>
        <div class="score-bar"><div class="score-fill" style="width:${score}%;background:${scoreColor}"></div></div>
      </div>
      ${agentRows}
    </div>`;
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || isLoading) return;

  input.value = '';
  input.style.height = 'auto';
  setLoading(true);
  addUserBubble(text);
  showTyping();

  try {
    const res = await fetch(BASE + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, session_id: sessionId }),
    });
    const data = await res.json();
    hideTyping();

    if (data.job_id) {
      // 분석 시작됨 — 진행 상황 표시 후 폴링
      addAiBubble(data.response);
      showProgress(data.job_id, data.tickers || []);
      startPolling(data.job_id);
    } else {
      addAiBubble(data.response, data.result_card);
    }
  } catch (e) {
    hideTyping();
    addAiBubble('⚠️ 서버 연결 오류. 잠시 후 다시 시도해주세요.');
  } finally {
    if (!pollingInterval) setLoading(false);
  }
}

function startPolling(jobId) {
  let elapsed = 0;
  pollingInterval = setInterval(async () => {
    elapsed += 5;
    try {
      const res = await fetch(BASE + '/jobs/' + jobId);
      const data = await res.json();
      if (data.status === 'completed') {
        clearInterval(pollingInterval);
        pollingInterval = null;
        removeProgress(jobId);
        setLoading(false);
        // 결과를 채팅으로 자동 전송
        await fetchResultSummary(jobId, data.results);
      } else if (data.status === 'failed') {
        clearInterval(pollingInterval);
        pollingInterval = null;
        removeProgress(jobId);
        setLoading(false);
        addAiBubble('❌ 분석 실패: ' + (data.error || '알 수 없는 오류'));
      }
    } catch (e) { /* 네트워크 일시 오류 무시 */ }
    if (elapsed > 600) { // 10분 타임아웃
      clearInterval(pollingInterval);
      pollingInterval = null;
      removeProgress(jobId);
      setLoading(false);
      addAiBubble('⏱️ 분석 시간이 초과됐습니다. /results 에서 확인해주세요.');
    }
  }, 5000);
}

async function fetchResultSummary(jobId, results) {
  if (!results || results.length === 0) return;
  for (const r of results) {
    const card = r.run_id ? await fetchCard(r.ticker) : null;
    const score = r.forensic_score != null ? Math.round(r.forensic_score) : '—';
    const tierEmoji = r.tier ? ['🔴','🟡','🟠','🟢'][r.tier-1] : '⚪';
    let summary = `**${r.ticker}** 분석 완료!\n\n포렌식 점수: **${score}점** ${tierEmoji} ${r.tier_label || ''}\n`;
    if (r.short_thesis) summary += `\n${r.short_thesis.slice(0, 300)}`;
    addAiBubble(summary, card);
  }
}

async function fetchCard(ticker) {
  try {
    const res = await fetch(BASE + '/results/' + ticker);
    if (!res.ok) return null;
    const data = await res.json();
    if (hasattr(data.get, 'run_at')) data.run_at = null;
    return data;
  } catch { return null; }
}

function suggest(text) {
  document.getElementById('msg-input').value = text;
  sendMessage();
}

function setLoading(v) {
  isLoading = v;
  document.getElementById('send-btn').disabled = v;
  document.getElementById('msg-input').disabled = v;
}

function saveHistory() {
  // 최근 40개만 유지
  if (history.length > 40) history = history.slice(-40);
  localStorage.setItem('chatHistory_' + sessionId, JSON.stringify(history));
}

function scrollToBottom() {
  const chat = document.getElementById('chat');
  setTimeout(() => chat.scrollTop = chat.scrollHeight, 50);
}

function now() {
  return new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// 자동 높이 조절
document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

// Enter 전송 (Shift+Enter 줄바꿈)
document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
</script>
</body>
</html>
